{% extends 'base.html' %}

{% block content %}
<h1 class="mb-3">Szczegóły książki</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <h3>{{ object.title }}</h3>

        <p class="text-muted mb-1">
            Autor: {{ object.author }}
        </p>

        <span class="badge bg-secondary">
            Rok: {{ object.year }}
        </span>
    </div>
</div>

<div class="mt-3">
    <a class="btn btn-warning" href="{% url 'book_edit' object.pk %}">
        Edytuj
    </a>

    <a class="btn btn-danger" href="{% url 'book_delete' object.pk %}">
        Usuń
    </a>

    <a class="btn btn-secondary" href="{% url 'book_list' %}">
        Powrót
    </a>
</div>

{% endblock %}
